[mod-name]
grounded-tree-selection-box=Grounded Tree Selection Box

[mod-description]
grounded-tree-selection-box=Adjusts the mouse cursor selection boxes of trees to be less obtrusive, making it easier to interact with entities behind trees without removing the trees first.


[mod-setting-name]
grounded-tree-selection-box-size-basis=Size basis
grounded-tree-selection-box-position=Position
grounded-tree-selection-box-shape=Shape
grounded-tree-selection-box-horizontal-padding=Horizontal padding
grounded-tree-selection-box-vertical-padding=Vertical padding
grounded-tree-selection-box-static-minimum-width=Static minimum width
grounded-tree-selection-box-static-minimum-height=Static minimum height
grounded-tree-selection-box-static-maximum-width=Static maximum width
grounded-tree-selection-box-static-maximum-height=Static maximum height
grounded-tree-selection-box-growable-minimum-width=Growable minimum width
grounded-tree-selection-box-growable-minimum-height=Growable minimum height
grounded-tree-selection-box-growable-maximum-width=Growable maximum width
grounded-tree-selection-box-growable-maximum-height=Growable maximum height

[mod-setting-description]
grounded-tree-selection-box-size-basis=The source box used as the basis for computing the size of the final selection box.
grounded-tree-selection-box-position=The method to determine the position of the final selectino box.
grounded-tree-selection-box-shape=Further adjustments to the shape of the final selection box.
grounded-tree-selection-box-horizontal-padding=The amount of extra (or removed) horizontal padding relative to the width of the basis box.
grounded-tree-selection-box-vertical-padding=The amount of extra (or removed) vertical padding relative to the height of the basis box.
grounded-tree-selection-box-static-minimum-width=The minimum allowed width of the selection box for static tree entities.
grounded-tree-selection-box-static-minimum-height=The minimum allowed height of the selection box for static tree entities.
grounded-tree-selection-box-static-maximum-width=The maximum allowed width of the selection box for static tree entities. Zero is interpreted as no maximum.
grounded-tree-selection-box-static-maximum-height=The maximum allowed height of the selection box for static tree entities. Zero is interpreted as no maximum.
grounded-tree-selection-box-growable-minimum-width=The minimum allowed width of the selection box for growable plants when they are fully mature. Younger plants may still have a smaller selection box.
grounded-tree-selection-box-growable-minimum-height=The minimum allowed width of the selection box for growable plants when they are fully mature. Younger plants may still have a smaller selection box.
grounded-tree-selection-box-growable-maximum-width=The maximum allowed width of the selection box for growable plants when they are fully mature. Zero is interpreted as no maximum.
grounded-tree-selection-box-growable-maximum-height=The maximum allowed width of the selection box for growable plants when they are fully mature. Zero is interpreted as no maximum.

[string-mod-setting]
grounded-tree-selection-box-size-basis-collision-box=Collision box
grounded-tree-selection-box-size-basis-original-selection-box=Original selection box
grounded-tree-selection-box-position-centered-on-entity=Center on entity
grounded-tree-selection-box-position-centered-on-collision-box=Center on collision box
grounded-tree-selection-box-position-grounded-on-collision-box=Grounded on collision box
grounded-tree-selection-box-position-grounded-on-original-selection-box=Grounded on original selection box
grounded-tree-selection-box-shape-rectangle=Rectangle
grounded-tree-selection-box-shape-small-square=Small square
grounded-tree-selection-box-shape-large-square=Large square

[string-mod-setting-description]
grounded-tree-selection-box-size-basis-collision-box=The size of a tree's new selection box will be based on its physical collision box.
grounded-tree-selection-box-size-basis-original-selection-box=The size of a tree's new selection box will be based on its original selection box.
grounded-tree-selection-box-position-centered-on-entity=A tree's selection box will be centered around the (0, 0) point of the entity.
grounded-tree-selection-box-position-centered-on-collision-box=A tree's selection box will be centered around its collision box.
grounded-tree-selection-box-position-grounded-on-collision-box=A tree's selection box will align with the lower edge of its collision box.
grounded-tree-selection-box-position-grounded-on-original-selection-box=A tree's selection box will remain aligned along its original lower edge.
grounded-tree-selection-box-shape-rectangle=A tree's selection box will be the same shape as the basis box plus padding.
grounded-tree-selection-box-shape-small-square=A tree's selection box will be shrunk to a square that fits inside the basis box plus padding.
grounded-tree-selection-box-shape-large-square=A tree's selection box will be enlarged to a square that contains the basis box plus padding.
